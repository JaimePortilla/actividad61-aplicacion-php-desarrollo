name: CI/CD - Build, Push & Deploy CRUD App

on:
  push:
    branches:
      - main  # Asegúrate de que sea main, no master

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir y etiquetar la imagen (BUILD)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/lamp-crud-app:latest .

      - name: Subir imagen a Docker Hub (PUSH)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/lamp-crud-app:latest

  deploy:
    name: Deploy to AWS Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Despliegue en servidor de producción
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            docker login -u $$   {{ secrets.DOCKER_USERNAME }} --password-stdin <<< "   $${{ secrets.DOCKER_TOKEN }}"  # Agrega login si repo privado
            cd ~/actividad61-aplicacion-php-produccion
            docker compose down -v --remove-orphans  # Limpieza completa
            docker rmi ${{ secrets.DOCKER_USERNAME }}/lamp-crud-app:latest || true  # Remueve imagen vieja
            docker compose pull
            docker compose up -d --force-recreate
            docker system prune -f  # Limpia caches extras
            echo "Deploy completado"